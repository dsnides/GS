<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gaussian Splat Renderer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace}
#c{display:block;width:100%;height:100%}
#ui{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:5px;
  background:rgba(6,6,10,0.9);border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;padding:9px 14px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);white-space:nowrap;
}
.btn{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
  color:rgba(180,180,200,0.8);font-family:'Courier New',monospace;font-size:10px;
  letter-spacing:.07em;padding:5px 12px;border-radius:6px;cursor:pointer;
  transition:all .15s;user-select:none;
}
.btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.btn.on{background:rgba(70,140,255,0.2);border-color:rgba(70,140,255,0.45);color:#7fc4ff}
.sep{width:1px;height:18px;background:rgba(255,255,255,0.1);margin:0 3px;flex-shrink:0}
#hud{position:fixed;top:18px;left:18px;color:rgba(255,255,255,0.28);font:10px/2.0 'Courier New',monospace;pointer-events:none}
#hud em{color:rgba(255,255,255,0.5);font-style:normal}
#fps{position:fixed;top:18px;right:18px;color:rgba(255,255,255,0.2);font:10px/1 'Courier New',monospace;pointer-events:none}
#label{
  position:fixed;bottom:74px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.22);font:10px/1.7 'Courier New',monospace;
  text-align:center;pointer-events:none;letter-spacing:.04em;white-space:nowrap;
}
#drop{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(0,0,0,0.82);border:2px dashed rgba(70,140,255,0.5);
  opacity:0;pointer-events:none;transition:opacity .18s;
}
#drop.active{opacity:1;pointer-events:all}
#drop svg{opacity:.55}
#drop p{color:rgba(200,210,255,0.75);font:11px/1.6 'Courier New',monospace;text-align:center;letter-spacing:.05em}
#drop strong{color:#7fc4ff;font-weight:normal}
#prog{position:fixed;top:0;left:0;right:0;height:2px;z-index:200;background:transparent}
#progBar{height:100%;width:0%;background:#468cff;transition:width .15s;border-radius:1px}
#status{
  position:fixed;top:18px;left:18px;margin-top:28px;
  color:rgba(70,140,255,0.65);font:10px/1 'Courier New',monospace;
  pointer-events:none;letter-spacing:.04em;
}
#fileIn{display:none}
#diag{
  position:fixed;top:56px;left:18px;width:340px;max-height:260px;overflow-y:auto;
  background:rgba(4,6,14,0.93);border:1px solid rgba(70,140,255,0.3);border-radius:8px;
  padding:10px 13px;z-index:300;display:none;
  font:10px/1.8 'Courier New',monospace;color:rgba(180,200,255,0.75);
}
#diag.show{display:block}
#diagClose{float:right;cursor:pointer;color:rgba(255,255,255,0.3);font-size:11px;margin-left:8px}
#diagClose:hover{color:#fff}
.dline{margin:0;padding:0}
.dline.ok{color:#5cba8a}
.dline.err{color:#f07070}
.dline.warn{color:#e0a040}
.dline.info{color:rgba(140,170,255,0.8)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="drop">
  <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
    <rect x="4" y="4" width="32" height="32" rx="6" stroke="#468cff" stroke-width="1.5" stroke-dasharray="4 3"/>
    <path d="M20 12v14M14 20l6-8 6 8" stroke="#468cff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M12 30h16" stroke="#468cff" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <p>Drop a <strong>.splat</strong> or <strong>.ply</strong> file here<br>to load a real Gaussian splat scene</p>
</div>
<div id="prog"><div id="progBar"></div></div>
<div id="hud">SPLATS <em id="cnt">—</em><br>ORBIT drag &nbsp;·&nbsp; ZOOM scroll &nbsp;·&nbsp; PAN right-drag</div>
<div id="status"></div>
<div id="fps">— fps</div>
<div id="label">4D Gaussian Splatting &nbsp;·&nbsp; each Gaussian carries a temporal dimension: position, scale &amp; opacity evolve continuously over t</div>
<input type="file" id="fileIn" accept=".splat,.ply">
<div id="diag"><span id="diagClose" onclick="document.getElementById('diag').classList.remove('show')">✕ close</span><div id="diagLines"></div></div>
<div id="ui">
  <button class="btn on" id="bNebula" onclick="loadScene('nebula')">NEBULA</button>
  <button class="btn" id="bHelix" onclick="loadScene('helix')">DNA HELIX</button>
  <button class="btn" id="bTorus" onclick="loadScene('torus')">TORUS KNOT</button>
  <div class="sep"></div>
  <button class="btn" id="b4d" onclick="toggle4D()">4D: OFF</button>
  <div class="sep"></div>
  <button class="btn" onclick="document.getElementById('fileIn').click()">OPEN FILE</button>
  <button class="btn" id="bFlipY" onclick="toggleYFlip()">FLIP Y</button>
  <button class="btn" onclick="resetCam()">RESET</button>
</div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────────────────────
// WORKER SOURCE
// ─────────────────────────────────────────────────────────────────────────────
// Worker splat layout  (WSPLAT = 26 floats/splat):
//   [0..2]   x,y,z         current position
//   [3..6]   qx,qy,qz,qw   rotation quaternion
//   [7..9]   sx,sy,sz       current scale
//   [10..13] cr,cg,cb,ca    colour + alpha
//   [14..16] bx,by,bz       base position
//   [17]     bca            base alpha
//   [18..20] bsx,bsy,bsz    base scale
//   [21..23] vx,vy,vz       velocity (4D)
//   [24]     ph             phase
//   [25]     fr             frequency
//
// Output instance buffer  (FLOATS = 15 floats/splat):
//   [0..2] pos  [3..6] rot  [7..9] scale  [10..13] rgba  [14] origIdx
//
// Protocol:
//   main→worker  {type:'init', wdata:ArrayBuffer, n}
//   main→worker  {type:'sort', vm4:[v2,v6,v10,v14], t4d, is4D, outBuf:ArrayBuffer}
//   worker→main  {type:'sorted', outBuf:ArrayBuffer}
//
// Radix sort:
//   IEEE 754 floats have a useful property: for non-negative floats the bit pattern
//   sorts identically to the value.  For negatives, flipping all bits restores order.
//   Transform: key = bits ^ ((-sign) | 0x80000000)  (where sign = bits >>> 31)
//   This maps every finite float to a uint32 that sorts in the same order.
//   We then do a 4-pass LSD radix sort (8 bits per pass) on the uint32 keys.
//   Cost: O(4n) counts + O(4n) scatters = O(n).  ~15ms for 1M splats in JS.
// ─────────────────────────────────────────────────────────────────────────────
const WORKER_SRC = `
'use strict';
const WSPLAT = 26;
const FLOATS  = 15;
let wd = null, n = 0;
// Pre-allocated sort scratch buffers (reinitialised on 'init')
let keys = null;   // Uint32Array(n) — sortable bit-pattern for each splat's z
let idx  = null;   // Uint32Array(n) — splat indices, reordered by sort
let tmp  = null;   // Uint32Array(n) — scatter target for each radix pass
const HIST = new Int32Array(256); // reused histogram (zeroed per pass)

self.onmessage = function(e){
  const msg = e.data;

  // ── Init: receive splat data, allocate scratch ──────────────────────────────
  if(msg.type === 'init'){
    wd   = new Float32Array(msg.wdata);
    n    = msg.n;
    keys = new Uint32Array(n);
    idx  = new Uint32Array(n);
    tmp  = new Uint32Array(n);
    for(let i=0;i<n;i++) idx[i]=i;
    return;
  }

  if(msg.type !== 'sort') return;

  const { vm4, t4d, is4D, outBuf } = msg;
  const out = new Float32Array(outBuf);
  const [v2,v6,v10,v14] = vm4;

  // ── 4D animation ────────────────────────────────────────────────────────────
  if(is4D){
    for(let i=0;i<n;i++){
      const b  = i*WSPLAT;
      const ph = wd[b+24] + t4d*wd[b+25];
      const amp= 0.55;
      wd[b  ] = wd[b+14] + wd[b+21]*Math.sin(ph)         *amp;
      wd[b+1] = wd[b+15] + wd[b+22]*Math.sin(ph*1.31+1.1)*amp;
      wd[b+2] = wd[b+16] + wd[b+23]*Math.sin(ph*0.73+2.3)*amp;
      wd[b+13]= wd[b+17] * (0.5 + 0.5*Math.abs(Math.sin(ph*0.47+wd[b+24]*0.3)));
      const sp= 0.85 + 0.3*Math.abs(Math.sin(ph*0.29));
      wd[b+7] = wd[b+18]*sp; wd[b+8]=wd[b+19]*sp; wd[b+9]=wd[b+20]*sp;
    }
  }

  // ── Compute camera-space z and convert to sortable uint32 keys ──────────────
  // Reuse a DataView over keys.buffer so we can write float bits as uint32.
  const keysDV = new DataView(keys.buffer);
  for(let i=0;i<n;i++){
    const b    = i*WSPLAT;
    const z    = v2*wd[b]+v6*wd[b+1]+v10*wd[b+2]+v14;
    // Write z's IEEE 754 bits into keys[i] as uint32, then transform for sort order.
    // We want ascending sort (far splats first), so we sort by z ascending.
    // floatToSortKey maps float→uint32 preserving order:
    //   negative floats → flip all bits; positive → flip sign bit only.
    keysDV.setFloat32(i*4, z, true); // store float bits
    const bits = keys[i];            // read back as uint32
    keys[i] = (bits ^ (( -(bits>>>31) ) | 0x80000000)) >>> 0;
  }

  // ── 4-pass LSD radix sort (8 bits per pass) on keys[], permuting idx[] ──────
  // Pass order: byte 0 (LSB) → byte 1 → byte 2 → byte 3 (MSB).
  // After all passes, idx is sorted so that keys[idx[0]] ≤ keys[idx[1]] ≤ …
  for(let pass=0;pass<4;pass++){
    const shift = pass*8;

    // Zero histogram
    HIST.fill(0);

    // Count occurrences of each byte value in this pass
    for(let i=0;i<n;i++) HIST[(keys[idx[i]]>>shift)&0xFF]++;

    // Exclusive prefix sum → starting output position for each bucket
    let sum=0;
    for(let b=0;b<256;b++){ const c=HIST[b]; HIST[b]=sum; sum+=c; }

    // Scatter idx into tmp in sorted order for this byte
    for(let i=0;i<n;i++){
      const bucket = (keys[idx[i]]>>shift)&0xFF;
      tmp[HIST[bucket]++] = idx[i];
    }

    // Swap idx ↔ tmp (copy tmp→idx)
    idx.set(tmp);
  }

  // ── Pack sorted splats into output buffer ────────────────────────────────────
  for(let ii=0;ii<n;ii++){
    const i = idx[ii];
    const b = i*WSPLAT;
    const o = ii*FLOATS;
    out[o  ]=wd[b  ]; out[o+1]=wd[b+1]; out[o+2]=wd[b+2];
    out[o+3]=wd[b+3]; out[o+4]=wd[b+4]; out[o+5]=wd[b+5]; out[o+6]=wd[b+6];
    out[o+7]=wd[b+7]; out[o+8]=wd[b+8]; out[o+9]=wd[b+9];
    out[o+10]=wd[b+10];out[o+11]=wd[b+11];out[o+12]=wd[b+12];out[o+13]=wd[b+13];
    out[o+14]=i;  // origIdx for SH texture lookup
  }

  self.postMessage({type:'sorted',outBuf:out.buffer},[out.buffer]);
};
`;

// ─────────────────────────────────────────────────────────────────────────────
// Constants  (must match worker)
const FLOATS = 15;
const BYTES  = FLOATS * 4;
const WSPLAT = 26;

// ─────────────────────────────────────────────────────────────────────────────
// WebGL2
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2',{alpha:false,antialias:false,premultipliedAlpha:true});
if(!gl){document.body.innerHTML='<p style="color:#f88;padding:2rem;font-family:monospace">WebGL2 required.</p>';throw 0;}

// ─────────────────────────────────────────────────────────────────────────────
// Shaders
const VS=`#version 300 es
precision highp float;
precision highp sampler2D;
layout(location=0) in vec2 q;
layout(location=1) in vec3 p;
layout(location=2) in vec4 r;
layout(location=3) in vec3 s;
layout(location=4) in vec4 c;
layout(location=5) in float origIdx;
uniform mat4 V,P;
uniform vec2 R;
uniform vec3 uEye;
uniform bool uHasSH;
uniform int  uSHDeg;
uniform sampler2D uSH;
out vec4 vc; out vec2 uv;

mat3 qmat(vec4 q){
  float x=q.x,y=q.y,z=q.z,w=q.w;
  return mat3(1.-2.*(y*y+z*z),2.*(x*y+w*z),2.*(x*z-w*y),
              2.*(x*y-w*z),1.-2.*(x*x+z*z),2.*(y*z+w*x),
              2.*(x*z+w*y),2.*(y*z-w*x),1.-2.*(x*x+y*y));
}
vec3 evalSH(int idx,vec3 d){
  int b=idx*12;
  #define F(o) texelFetch(uSH,ivec2((b+(o))%4096,(b+(o))/4096),0)
  vec4 r0=F(0),r1=F(1),r2=F(2),r3=F(3);
  vec4 g0=F(4),g1=F(5),g2=F(6),g3=F(7);
  vec4 b0=F(8),b1=F(9),b2=F(10),b3=F(11);
  #undef F
  const float C0=.28209479,C1=.48860251;
  const float C2a=1.09254843,C2b=.31539157,C2c=.54627422;
  const float C3a=-.59004359,C3b=2.89061145,C3c=-.45704580;
  const float C3d=.37317633,C3e=-.45704580,C3f=1.44530572,C3g=-.59004359;
  float x=d.x,y=d.y,z=d.z,xx=x*x,yy=y*y,zz=z*z,xy=x*y,xz=x*z,yz=y*z;
  float rv=C0*r0.x,gv=C0*g0.x,bv=C0*b0.x;
  if(uSHDeg>=1){rv+=C1*(-y*r0.y+z*r0.z-x*r0.w);gv+=C1*(-y*g0.y+z*g0.z-x*g0.w);bv+=C1*(-y*b0.y+z*b0.z-x*b0.w);}
  if(uSHDeg>=2){
    rv+=C2a*xy*r1.x+C2a*(-yz)*r1.y+C2b*(2.*zz-xx-yy)*r1.z+C2a*(-xz)*r1.w+C2c*(xx-yy)*r2.x;
    gv+=C2a*xy*g1.x+C2a*(-yz)*g1.y+C2b*(2.*zz-xx-yy)*g1.z+C2a*(-xz)*g1.w+C2c*(xx-yy)*g2.x;
    bv+=C2a*xy*b1.x+C2a*(-yz)*b1.y+C2b*(2.*zz-xx-yy)*b1.z+C2a*(-xz)*b1.w+C2c*(xx-yy)*b2.x;
  }
  if(uSHDeg>=3){
    rv+=C3a*y*(3.*xx-yy)*r2.y+C3b*xy*z*r2.z+C3c*y*(4.*zz-xx-yy)*r2.w+C3d*z*(2.*zz-3.*xx-3.*yy)*r3.x+C3e*x*(4.*zz-xx-yy)*r3.y+C3f*z*(xx-yy)*r3.z+C3g*x*(xx-3.*yy)*r3.w;
    gv+=C3a*y*(3.*xx-yy)*g2.y+C3b*xy*z*g2.z+C3c*y*(4.*zz-xx-yy)*g2.w+C3d*z*(2.*zz-3.*xx-3.*yy)*g3.x+C3e*x*(4.*zz-xx-yy)*g3.y+C3f*z*(xx-yy)*g3.z+C3g*x*(xx-3.*yy)*g3.w;
    bv+=C3a*y*(3.*xx-yy)*b2.y+C3b*xy*z*b2.z+C3c*y*(4.*zz-xx-yy)*b2.w+C3d*z*(2.*zz-3.*xx-3.*yy)*b3.x+C3e*x*(4.*zz-xx-yy)*b3.y+C3f*z*(xx-yy)*b3.z+C3g*x*(xx-3.*yy)*b3.w;
  }
  return clamp(vec3(rv,gv,bv)+.5,0.,1.);
}
void main(){
  vec4 pc=V*vec4(p,1.);
  if(pc.z>-.05){gl_Position=vec4(9.,9.,9.,1.);return;}
  vec4 cl=P*pc;
  float tz=pc.z,tx=pc.x,ty=pc.y,iZ=1./tz,iZ2=iZ*iZ;
  float fx=P[0][0]*R.x*.5,fy=P[1][1]*R.y*.5;
  mat3 M=qmat(r)*mat3(s.x,0.,0.,0.,s.y,0.,0.,0.,s.z);
  mat3 Sg=M*transpose(M);mat3 W=mat3(V);mat3 Sc=W*Sg*transpose(W);
  vec3 j0=vec3(fx*iZ,0.,-fx*tx*iZ2),j1=vec3(0.,fy*iZ,-fy*ty*iZ2);
  float cxx=dot(j0,Sc*j0)+.3,cxy=dot(j0,Sc*j1),cyy=dot(j1,Sc*j1)+.3;
  float tr=cxx+cyy,disc=sqrt(max(.25*(cxx-cyy)*(cxx-cyy)+cxy*cxy,0.));
  float l1=.5*tr+disc,l2=max(.5*tr-disc,.05);
  vec2 e1=abs(cxy)>1e-4?normalize(vec2(l1-cyy,cxy)):(cxx>=cyy?vec2(1.,0.):vec2(0.,1.));
  gl_Position=vec4(cl.xy/cl.w+(q.x*sqrt(l1)*e1+q.y*sqrt(l2)*vec2(-e1.y,e1.x))*3./R*2.,cl.z/cl.w,1.);
  vec4 col=c;
  if(uHasSH)col.rgb=evalSH(int(origIdx),normalize(p-uEye));
  vc=col;uv=q;
}`;
const FS=`#version 300 es
precision highp float;
in vec4 vc;in vec2 uv;out vec4 o;
void main(){float r2=dot(uv,uv);if(r2>1.)discard;float a=vc.a*exp(-4.5*r2);o=vec4(vc.rgb*a,a);}`;

function mkShader(src,type){
  const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error('Shader:',gl.getShaderInfoLog(s));
  return s;
}
const prog=gl.createProgram();
gl.attachShader(prog,mkShader(VS,gl.VERTEX_SHADER));
gl.attachShader(prog,mkShader(FS,gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS))console.error('Link:',gl.getProgramInfoLog(prog));
const uV=gl.getUniformLocation(prog,'V'),uP=gl.getUniformLocation(prog,'P'),uR=gl.getUniformLocation(prog,'R');
const uEye=gl.getUniformLocation(prog,'uEye'),uHasSH=gl.getUniformLocation(prog,'uHasSH');
const uSHDeg=gl.getUniformLocation(prog,'uSHDeg'),uSHTex=gl.getUniformLocation(prog,'uSH');

// ─────────────────────────────────────────────────────────────────────────────
// SH texture
const SH_TEX_W=4096;
const shTex=gl.createTexture();
let hasSH=false,shDeg=0;
function uploadSHTexture(data,h){
  gl.bindTexture(gl.TEXTURE_2D,shTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA32F,SH_TEX_W,h,0,gl.RGBA,gl.FLOAT,data);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.bindTexture(gl.TEXTURE_2D,null);
}

// ─────────────────────────────────────────────────────────────────────────────
// VAO / GPU buffers
const vao=gl.createVertexArray();gl.bindVertexArray(vao);
const qBuf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,qBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);gl.vertexAttribDivisor(0,0);
const iBuf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,iBuf);
gl.bufferData(gl.ARRAY_BUFFER,1,gl.DYNAMIC_DRAW);
gl.enableVertexAttribArray(1);gl.vertexAttribPointer(1,3,gl.FLOAT,false,BYTES, 0);gl.vertexAttribDivisor(1,1);
gl.enableVertexAttribArray(2);gl.vertexAttribPointer(2,4,gl.FLOAT,false,BYTES,12);gl.vertexAttribDivisor(2,1);
gl.enableVertexAttribArray(3);gl.vertexAttribPointer(3,3,gl.FLOAT,false,BYTES,28);gl.vertexAttribDivisor(3,1);
gl.enableVertexAttribArray(4);gl.vertexAttribPointer(4,4,gl.FLOAT,false,BYTES,40);gl.vertexAttribDivisor(4,1);
gl.enableVertexAttribArray(5);gl.vertexAttribPointer(5,1,gl.FLOAT,false,BYTES,56);gl.vertexAttribDivisor(5,1);
gl.bindVertexArray(null);

// ─────────────────────────────────────────────────────────────────────────────
// Matrix helpers
function sub3(a,b){return[a[0]-b[0],a[1]-b[1],a[2]-b[2]];}
function dot3(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2];}
function cross3(a,b){return[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];}
function norm3(v){const n=Math.hypot(v[0],v[1],v[2]);return[v[0]/n,v[1]/n,v[2]/n];}
function lookAt(eye,ctr,up){
  const z=norm3(sub3(eye,ctr)),x=norm3(cross3(up,z)),y=cross3(z,x);
  return new Float32Array([x[0],y[0],z[0],0,x[1],y[1],z[1],0,x[2],y[2],z[2],0,-dot3(x,eye),-dot3(y,eye),-dot3(z,eye),1]);
}
function persp(fovDeg,asp,n,f){
  const t=1/Math.tan(fovDeg*Math.PI/360),d=n-f;
  return new Float32Array([t/asp,0,0,0,0,t,0,0,0,0,(f+n)/d,-1,0,0,2*f*n/d,0]);
}

// ─────────────────────────────────────────────────────────────────────────────
// Camera
let cam={theta:.45,phi:.28,r:12,tx:0,ty:0,tz:0,fov:55};
const camDefaults={nebula:{r:13,phi:.28,theta:.45},helix:{r:8,phi:.12,theta:.5},torus:{r:7,phi:.32,theta:.4}};

// Colour helpers
function hsl(h,s,l){h/=360;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h*12)%12;return l-a*Math.max(-1,Math.min(k-3,9-k,1));};return[f(0),f(8),f(4)];}
function rn(){return(Math.random()+Math.random()+Math.random()-1.5)*1.3;}

// ─────────────────────────────────────────────────────────────────────────────
// Scene generators: write DIRECTLY into a Float32Array(n*WSPLAT) — no JS objects
// This avoids allocating ~1M objects just to immediately re-flatten them.
function allocWData(n){return new Float32Array(n*WSPLAT);}

function genNebula(){
  const coreN=2000,armN=3000,arms=2;const n=coreN+armN*arms;
  const wd=allocWData(n);let wi=0;
  function push(x,y,z,qx,qy,qz,qw,sx,sy,sz,cr,cg,cb,ca,vx,vy,vz,ph,fr){
    const b=wi*WSPLAT;
    wd[b]=x;wd[b+1]=y;wd[b+2]=z;wd[b+3]=qx;wd[b+4]=qy;wd[b+5]=qz;wd[b+6]=qw;
    wd[b+7]=sx;wd[b+8]=sy;wd[b+9]=sz;wd[b+10]=cr;wd[b+11]=cg;wd[b+12]=cb;wd[b+13]=ca;
    wd[b+14]=x;wd[b+15]=y;wd[b+16]=z;wd[b+17]=ca;wd[b+18]=sx;wd[b+19]=sy;wd[b+20]=sz;
    wd[b+21]=vx;wd[b+22]=vy;wd[b+23]=vz;wd[b+24]=ph;wd[b+25]=fr;wi++;
  }
  for(let i=0;i<coreN;i++){
    const r=Math.pow(Math.random(),1.6)*2.4,th=Math.random()*Math.PI*2,ph2=(Math.random()-.5)*Math.PI*.9;
    const x=r*Math.cos(ph2)*Math.cos(th),y=r*Math.sin(ph2)*.35,z=r*Math.cos(ph2)*Math.sin(th);
    const t=Math.pow(Math.random(),2);const[cr,cg,cb]=hsl(18+t*40,.92,.52+t*.18);const sc=.05+Math.random()*.12;
    push(x,y,z,0,0,0,1,sc,sc,sc,cr,cg,cb,.3+Math.random()*.45,rn()*.2,rn()*.06,rn()*.2,Math.random()*Math.PI*2,.3+Math.random()*.5);
  }
  for(let arm=0;arm<arms;arm++){
    for(let i=0;i<armN;i++){
      const t=Math.random(),ang=arm*Math.PI+t*Math.PI*3.3+rn()*.55,rad=.7+t*4.4;
      const x=rad*Math.cos(ang)+rn()*.4,y=rn()*.2,z=rad*Math.sin(ang)+rn()*.4;
      const[cr,cg,cb]=hsl(arm===0?210+t*38:260+t*42,.75,.42+Math.random()*.22);const sc=.08+t*.19+Math.random()*.09;
      push(x,y,z,0,0,0,1,sc,sc,sc,cr,cg,cb,.07+Math.random()*.22,rn()*.35,rn()*.07,rn()*.35,Math.random()*Math.PI*2,.15+Math.random()*.32);
    }
  }
  return{wd,n};
}
function genHelix(){
  const strandN=1700,bpN=6,bpCount=180;const n=strandN*2+bpCount*(bpN+1);
  const wd=allocWData(n);let wi=0;
  function push(x,y,z,sx,sy,sz,cr,cg,cb,ca,vx,vy,vz,ph,fr){
    const b=wi*WSPLAT;
    wd[b]=x;wd[b+1]=y;wd[b+2]=z;wd[b+3]=0;wd[b+4]=0;wd[b+5]=0;wd[b+6]=1;
    wd[b+7]=sx;wd[b+8]=sy;wd[b+9]=sz;wd[b+10]=cr;wd[b+11]=cg;wd[b+12]=cb;wd[b+13]=ca;
    wd[b+14]=x;wd[b+15]=y;wd[b+16]=z;wd[b+17]=ca;wd[b+18]=sx;wd[b+19]=sy;wd[b+20]=sz;
    wd[b+21]=vx;wd[b+22]=vy;wd[b+23]=vz;wd[b+24]=ph;wd[b+25]=fr;wi++;
  }
  for(let strand=0;strand<2;strand++){
    const off=strand*Math.PI;
    for(let i=0;i<strandN;i++){
      const t=i/strandN,ang=t*Math.PI*9+off,y=(t-.5)*7;
      const x=Math.cos(ang)*1.1+rn()*.07,z=Math.sin(ang)*1.1+rn()*.07;
      const[cr,cg,cb]=strand===0?hsl(185+rn()*10,.88,.65):hsl(322+rn()*10,.88,.65);const sc=.04+Math.random()*.035;
      push(x,y,z,sc,sc,sc,cr,cg,cb,.5+Math.random()*.3,Math.cos(ang+Math.PI/2)*.28,0,Math.sin(ang+Math.PI/2)*.28,t*Math.PI*2,.6);
    }
  }
  for(let i=0;i<bpCount;i++){
    const t=i/bpCount,ang=t*Math.PI*9,y=(t-.5)*7;
    const x1=Math.cos(ang)*1.1,z1=Math.sin(ang)*1.1;
    for(let j=0;j<=bpN;j++){const s=j/bpN;push(x1+s*(-2*x1),y,z1+s*(-2*z1),.025,.025,.025,.9,.85,.5,.18,0,0,0,0,0);}
  }
  return{wd,n:wi};
}
function genTorus(){
  const knotN=4500,cloudN=1500;const n=knotN+cloudN;
  const wd=allocWData(n);let wi=0;
  function push(x,y,z,sx,sy,sz,cr,cg,cb,ca,vx,vy,vz,ph,fr){
    const b=wi*WSPLAT;
    wd[b]=x;wd[b+1]=y;wd[b+2]=z;wd[b+3]=0;wd[b+4]=0;wd[b+5]=0;wd[b+6]=1;
    wd[b+7]=sx;wd[b+8]=sy;wd[b+9]=sz;wd[b+10]=cr;wd[b+11]=cg;wd[b+12]=cb;wd[b+13]=ca;
    wd[b+14]=x;wd[b+15]=y;wd[b+16]=z;wd[b+17]=ca;wd[b+18]=sx;wd[b+19]=sy;wd[b+20]=sz;
    wd[b+21]=vx;wd[b+22]=vy;wd[b+23]=vz;wd[b+24]=ph;wd[b+25]=fr;wi++;
  }
  for(let i=0;i<knotN;i++){
    const t=(i/knotN)*Math.PI*2;
    const x=(Math.sin(t)+2*Math.sin(2*t))*.85+rn()*.11;
    const y=(Math.cos(t)-2*Math.cos(2*t))*.85+rn()*.11;
    const z=-Math.sin(3*t)*1.05+rn()*.11;
    const[cr,cg,cb]=hsl(((t/(Math.PI*2))*360+120)%360,.92,.62);const sc=.04+Math.random()*.04;
    push(x,y,z,sc,sc,sc,cr,cg,cb,.48+Math.random()*.3,rn()*.3,rn()*.3,rn()*.3,t,.4+Math.random()*.3);
  }
  for(let i=0;i<cloudN;i++){
    const t=Math.random()*Math.PI*2;
    const x=(Math.sin(t)+2*Math.sin(2*t))*.85,y=(Math.cos(t)-2*Math.cos(2*t))*.85,z=-Math.sin(3*t)*1.05;
    const[cr,cg,cb]=hsl(((t/(Math.PI*2))*360+150)%360,.7,.38);const sc=.12+Math.random()*.18;
    push(x+rn()*.5,y+rn()*.5,z+rn()*.5,sc,sc,sc,cr,cg,cb,.04+Math.random()*.07,0,0,0,0,0);
  }
  return{wd,n};
}

// ─────────────────────────────────────────────────────────────────────────────
// Worker management
let worker      = null;
let renderBuf   = null;   // Float32Array(n*FLOATS) — owned by main, ready to upload
let workerBusy  = false;
let splatCount  = 0;
let is4D        = false;
let t4d         = 0;
let yFlip       = false;
let currentScene= 'nebula';
let lastT       = performance.now();
let fpsC=0,fpsT=0;
const dpr = Math.min(devicePixelRatio||1,2);

function spawnWorker(){
  if(worker)worker.terminate();
  const blob=new Blob([WORKER_SRC],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  worker=new Worker(url);URL.revokeObjectURL(url);
  worker.onmessage=onWorkerMessage;
  worker.onerror=e=>{diag('Worker JS error: '+(e.message||String(e)),'err');console.error(e);};
  workerBusy=false;renderBuf=null;_workerFirstReturn=false;
  diag('Worker spawned','ok');
}
function onWorkerMessage(e){
  if(e.data.type!=='sorted')return;
  renderBuf=new Float32Array(e.data.outBuf);
  workerBusy=false;
  // Log first return only
  if(!_workerFirstReturn){_workerFirstReturn=true;diag('Worker returned first sorted buffer — rendering active','ok');}
}
let _workerFirstReturn=false;
function requestSort(vm){
  if(!worker||workerBusy||!renderBuf)return;
  const v2=vm[2],v6=vm[6],v10=vm[10],v14=vm[14];
  const buf=renderBuf.buffer;renderBuf=null;workerBusy=true;
  worker.postMessage({type:'sort',vm4:[v2,v6,v10,v14],t4d,is4D,outBuf:buf},[buf]);
}
function initWorker(wd,n){
  spawnWorker();
  diag('Transferring '+n.toLocaleString()+' splats ('+((n*WSPLAT*4/1024/1024).toFixed(1))+'MB) to worker…');
  const buf=wd.buffer;
  worker.postMessage({type:'init',wdata:buf,n},[buf]);
  diag('Init sent — awaiting first sort');
  renderBuf=new Float32Array(n*FLOATS);
  diag('Output buf: '+(n*FLOATS*4/1024/1024).toFixed(1)+'MB');
}

let sceneCentroid=[0,0,0];

function autoFitCamFromWData(wd,n){
  let mx=0,my=0,mz=0;
  for(let i=0;i<n;i++){const b=i*WSPLAT;mx+=wd[b];my+=wd[b+1];mz+=wd[b+2];}
  mx/=n;my/=n;mz/=n;
  let rad=0;
  for(let i=0;i<n;i++){const b=i*WSPLAT;const d=Math.hypot(wd[b]-mx,wd[b+1]-my,wd[b+2]-mz);if(d>rad)rad=d;}
  cam.tx=mx;cam.ty=my;cam.tz=mz;cam.r=Math.max(1,rad*2.2);cam.phi=.28;cam.theta=.45;
}

function loadScene(name){
  currentScene=name;
  ['bNebula','bHelix','bTorus'].forEach(id=>document.getElementById(id).classList.toggle('on',
    (id==='bNebula'&&name==='nebula')||(id==='bHelix'&&name==='helix')||(id==='bTorus'&&name==='torus')));
  const {wd,n}=name==='nebula'?genNebula():name==='helix'?genHelix():genTorus();
  splatCount=n;hasSH=false;shDeg=0;
  const d=camDefaults[name];cam.r=d.r;cam.phi=d.phi;cam.theta=d.theta;cam.tx=cam.ty=cam.tz=0;

// ─────────────────────────────────────────────────────────────────────────────
// Render loop
function frame(){
  requestAnimationFrame(frame);
  const now=performance.now(),dt=Math.min((now-lastT)/1000,.05);lastT=now;
  fpsC++;fpsT+=dt;
  if(fpsT>=.5){document.getElementById('fps').textContent=Math.round(fpsC/fpsT)+' fps';fpsC=0;fpsT=0;}
  if(!splatCount)return;
  const W=Math.round(canvas.clientWidth*dpr),H=Math.round(canvas.clientHeight*dpr);
  if(canvas.width!==W||canvas.height!==H){canvas.width=W;canvas.height=H;}
  gl.viewport(0,0,W,H);
  if(is4D)t4d+=dt;
  const eye=camEye();
  const Vm=lookAt(eye,[cam.tx,cam.ty,cam.tz],[0,1,0]);
  // FLIP Y: pre-multiply view by scale(1,-1,1,1) — negates world Y before transform.
  // Equivalent to column 1 of the column-major matrix: indices [4,5,6,7].
  if(yFlip){Vm[4]=-Vm[4];Vm[5]=-Vm[5];Vm[6]=-Vm[6];Vm[7]=-Vm[7];}
  const Pm=persp(cam.fov,W/H,.1,100);
  // Upload last completed sort to GPU, then hand buffer to worker for next sort.
  // Track upload separately — requestSort() nulls renderBuf (transfers it), but
  // the GPU buffer is valid for drawing as soon as bufferData() returns.
  let gpuReady=false;
  if(renderBuf){
    gl.bindBuffer(gl.ARRAY_BUFFER,iBuf);
    gl.bufferData(gl.ARRAY_BUFFER,renderBuf,gl.DYNAMIC_DRAW);
    gpuReady=true;
    if(!workerBusy)requestSort(Vm);
  }
  if(!gpuReady)return; // first frame: worker hasn't returned yet
  gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);gl.blendFunc(gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
  gl.disable(gl.DEPTH_TEST);gl.disable(gl.CULL_FACE);
  gl.useProgram(prog);
  gl.uniformMatrix4fv(uV,false,Vm);gl.uniformMatrix4fv(uP,false,Pm);
  gl.uniform2f(uR,W,H);gl.uniform3f(uEye,eye[0],yFlip?-eye[1]:eye[1],eye[2]);
  gl.uniform1i(uHasSH,hasSH?1:0);gl.uniform1i(uSHDeg,shDeg);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,shTex);gl.uniform1i(uSHTex,0);
  gl.bindVertexArray(vao);gl.drawArraysInstanced(gl.TRIANGLE_STRIP,0,4,splatCount);
  gl.bindVertexArray(null);
}

// ── .splat parser ──────────────────────────────────────────────────────────────
// Writes directly into Float32Array(n*WSPLAT) — no intermediate JS objects.
// 32 bytes/splat: xyz(f32×3) scale(f32×3,log) rgba(u8×4) qxyzw(u8×4,packed)
function parseSplat(buf,onP){
  const SPLAT_ROW=32,n=(buf.byteLength/SPLAT_ROW)|0;
  const dv=new DataView(buf);
  const wd=new Float32Array(n*WSPLAT);
  for(let i=0;i<n;i++){
    if(i%100000===0)onP(i/n);
    const off=i*SPLAT_ROW,b=i*WSPLAT;
    const x=dv.getFloat32(off,true),y=dv.getFloat32(off+4,true),z=dv.getFloat32(off+8,true);
    const sx=Math.exp(dv.getFloat32(off+12,true)),sy=Math.exp(dv.getFloat32(off+16,true)),sz=Math.exp(dv.getFloat32(off+20,true));
    const cr=dv.getUint8(off+24)/255,cg=dv.getUint8(off+25)/255,cb=dv.getUint8(off+26)/255,ca=dv.getUint8(off+27)/255;
    let qx=dv.getUint8(off+28)/128-1,qy=dv.getUint8(off+29)/128-1,qz=dv.getUint8(off+30)/128-1,qw=dv.getUint8(off+31)/128-1;
    const qn=Math.hypot(qx,qy,qz,qw)||1;qx/=qn;qy/=qn;qz/=qn;qw/=qn;
    wd[b]=x;wd[b+1]=y;wd[b+2]=z;wd[b+3]=qx;wd[b+4]=qy;wd[b+5]=qz;wd[b+6]=qw;
    wd[b+7]=sx;wd[b+8]=sy;wd[b+9]=sz;wd[b+10]=cr;wd[b+11]=cg;wd[b+12]=cb;wd[b+13]=ca;
    wd[b+14]=x;wd[b+15]=y;wd[b+16]=z;wd[b+17]=ca;wd[b+18]=sx;wd[b+19]=sy;wd[b+20]=sz;
    // vel/ph/fr = 0 (bytes 21-25 default to 0 from Float32Array)
  }
  return{wd,n,shFlat:null,shDeg:0};
}

// ── .ply parser ────────────────────────────────────────────────────────────────
// Writes directly into Float32Array(n*WSPLAT) + Float32Array(n*48) for SH.
// No intermediate JS object array — safe for 1M+ splats.
function parsePly(buf,onP){
  const td=new TextDecoder(),bytes=new Uint8Array(buf);
  // Try "end_header\n" first, then "end_header\r\n" (Windows PLY files)
  let hdrEnd=-1;
  const mk =[101,110,100,95,104,101,97,100,101,114,10];   // end_header\n
  const mkCR=[101,110,100,95,104,101,97,100,101,114,13,10]; // end_header\r\n
  outer:for(let i=0;i<bytes.length-mkCR.length;i++){
    let mLF=true,mCR=true;
    for(let j=0;j<mk.length;j++)  if(bytes[i+j]!==mk[j])  {mLF=false;break;}
    if(mLF){hdrEnd=i+mk.length;break outer;}
    for(let j=0;j<mkCR.length;j++)if(bytes[i+j]!==mkCR[j]){mCR=false;break;}
    if(mCR){hdrEnd=i+mkCR.length;break outer;}
  }
  if(hdrEnd<0)throw new Error('No end_header in PLY');
  diag('PLY header ends at byte '+hdrEnd+', format: binary_little_endian assumed');
  const header=td.decode(bytes.slice(0,hdrEnd));
  let numVerts=0;const props=[];let inV=false;
  for(const line of header.split('\n')){
    const t=line.trim();
    if(t.startsWith('element vertex ')){numVerts=parseInt(t.split(' ')[2]);inV=true;}
    else if(t.startsWith('element ')&&!t.startsWith('element vertex'))inV=false;
    else if(t.startsWith('property ')&&inV){const p=t.split(' ');props.push({type:p[1],name:p[2]});}
  }
  if(!numVerts)throw new Error('No vertex element');
  diag('PLY vertex count: '+numVerts.toLocaleString()+', properties: '+props.length);
  const SZ={char:1,uchar:1,short:2,ushort:2,int:4,uint:4,float:4,double:8,float32:4,float64:8};
  const propOff={};let stride=0;
  for(const p of props){propOff[p.name]=stride;stride+=(SZ[p.type]||4);}
  diag('Stride: '+stride+' bytes/splat. Has x:'+('x' in propOff)+' opacity:'+('opacity' in propOff)+' rot_0:'+('rot_0' in propOff)+' scale_0:'+('scale_0' in propOff));
  let maxRest=-1;
  for(const p of props)if(p.name.startsWith('f_rest_')){const k=parseInt(p.name.slice(7));if(k>maxRest)maxRest=k;}
  const numRest=maxRest+1,deg=numRest>=45?3:numRest>=24?2:numRest>=9?1:0;
  const hasFdc='f_dc_0' in propOff;
  diag('f_dc present: '+hasFdc+', f_rest count: '+numRest+' → SH deg '+deg);
  const dv=new DataView(buf,hdrEnd);
  const wd=new Float32Array(numVerts*WSPLAT);
  const shFlat=hasFdc?new Float32Array(numVerts*48):null;
  const perCh=(numRest/3)|0;
  // Pre-build lookup arrays for f_rest offsets to avoid repeated string ops in hot loop
  const restOffR=new Int32Array(perCh),restOffG=new Int32Array(perCh),restOffB=new Int32Array(perCh);
  for(let j=0;j<perCh;j++){
    restOffR[j]=propOff['f_rest_'+j]??-1;
    restOffG[j]=propOff['f_rest_'+(perCh+j)]??-1;
    restOffB[j]=propOff['f_rest_'+(2*perCh+j)]??-1;
  }
  const xOff=propOff['x']??0,yOff=propOff['y']??4,zOff=propOff['z']??8;
  const s0Off=propOff['scale_0']??0,s1Off=propOff['scale_1']??0,s2Off=propOff['scale_2']??0;
  const opOff=propOff['opacity']??0;
  const r0Off=propOff['rot_0']??0,r1Off=propOff['rot_1']??0,r2Off=propOff['rot_2']??0,r3Off=propOff['rot_3']??0;
  const dc0Off=hasFdc?(propOff['f_dc_0']??0):0;
  const dc1Off=hasFdc?(propOff['f_dc_1']??0):0;
  const dc2Off=hasFdc?(propOff['f_dc_2']??0):0;

  for(let i=0;i<numVerts;i++){
    if(i%100000===0)onP(i/numVerts);
    const base=i*stride,b=i*WSPLAT;
    const x=dv.getFloat32(base+xOff,true),y=dv.getFloat32(base+yOff,true),z=dv.getFloat32(base+zOff,true);
    const sx=Math.exp(dv.getFloat32(base+s0Off,true)),sy=Math.exp(dv.getFloat32(base+s1Off,true)),sz=Math.exp(dv.getFloat32(base+s2Off,true));
    const ca=Math.max(0,Math.min(1,sigmoid(dv.getFloat32(base+opOff,true))));
    let qw=dv.getFloat32(base+r0Off,true),qx=dv.getFloat32(base+r1Off,true),qy=dv.getFloat32(base+r2Off,true),qz=dv.getFloat32(base+r3Off,true);
    const qn=Math.hypot(qx,qy,qz,qw)||1;qx/=qn;qy/=qn;qz/=qn;qw/=qn;
    const cr=hasFdc?dcToLinear(dv.getFloat32(base+dc0Off,true)):.6;
    const cg=hasFdc?dcToLinear(dv.getFloat32(base+dc1Off,true)):.6;
    const cb=hasFdc?dcToLinear(dv.getFloat32(base+dc2Off,true)):.6;
    wd[b]=x;wd[b+1]=y;wd[b+2]=z;wd[b+3]=qx;wd[b+4]=qy;wd[b+5]=qz;wd[b+6]=qw;
    wd[b+7]=sx;wd[b+8]=sy;wd[b+9]=sz;wd[b+10]=cr;wd[b+11]=cg;wd[b+12]=cb;wd[b+13]=ca;
    wd[b+14]=x;wd[b+15]=y;wd[b+16]=z;wd[b+17]=ca;wd[b+18]=sx;wd[b+19]=sy;wd[b+20]=sz;
    if(hasFdc&&shFlat){
      const sb=i*48;
      shFlat[sb  ]=dv.getFloat32(base+dc0Off,true);
      shFlat[sb+16]=dv.getFloat32(base+dc1Off,true);
      shFlat[sb+32]=dv.getFloat32(base+dc2Off,true);
      for(let j=0;j<perCh;j++){
        if(restOffR[j]>=0)shFlat[sb+j+1]    =dv.getFloat32(base+restOffR[j],true);
        if(restOffG[j]>=0)shFlat[sb+16+j+1] =dv.getFloat32(base+restOffG[j],true);
        if(restOffB[j]>=0)shFlat[sb+32+j+1] =dv.getFloat32(base+restOffB[j],true);
      }
    }
  }
  return{wd,n:numVerts,shFlat,shDeg:deg};
}

function loadFile(file){
  if(!file)return;
  diagClear();
  const ext=file.name.split('.').pop().toLowerCase();
  diag('File: '+file.name+' ('+( file.size/1024/1024).toFixed(1)+'MB, .'+ext+')');
  if(ext!=='splat'&&ext!=='ply'){diag('Unsupported format','err');setStatus('Unsupported — use .splat or .ply');return;}
  setStatus('Reading '+file.name+' …');setProgress(.02);
  const reader=new FileReader();
  reader.onprogress=e=>{if(e.lengthComputable)setProgress(.05+.4*(e.loaded/e.total));};
  reader.onload=e=>{
    const buf=e.target.result;
    diag('FileReader complete: '+( buf.byteLength/1024/1024).toFixed(1)+'MB in memory','ok');
    setProgress(.45);
    setTimeout(()=>{
      try{
        const onProg=p=>setProgress(.45+.5*p);
        diag('Starting '+ext.toUpperCase()+' parse…');
        const{wd,n,shFlat,shDeg:deg}=ext==='splat'?parseSplat(buf,onProg):parsePly(buf,onProg);
        diag('Parse complete: '+n.toLocaleString()+' splats'+(deg>0?' (SH deg '+deg+')':''),'ok');
        if(!n){diag('Zero splats parsed — check file format','err');setStatus('No splats found');return;}
        commitWData(wd,n,shFlat,deg,n.toLocaleString()+' splats · '+file.name);
      }catch(err){
        diag('Parse error: '+err.message,'err');
        setStatus('Parse error: '+err.message);console.error(err);setProgress(0);
      }
    },16);
  };
  reader.onerror=e=>{diag('FileReader error: '+e,'err');setStatus('File read error');};
  reader.readAsArrayBuffer(file);
}

// Drag-and-drop + file picker
const dropEl=document.getElementById('drop');let dragCtr=0;
document.addEventListener('dragenter',e=>{e.preventDefault();dragCtr++;if(e.dataTransfer.types.includes('Files'))dropEl.classList.add('active');});
document.addEventListener('dragleave',()=>{if(--dragCtr<=0){dragCtr=0;dropEl.classList.remove('active');}});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();dragCtr=0;dropEl.classList.remove('active');const f=e.dataTransfer.files[0];if(f)loadFile(f);});
document.getElementById('fileIn').addEventListener('change',e=>{loadFile(e.target.files[0]);e.target.value='';});

// ─────────────────────────────────────────────────────────────────────────────
loadScene('nebula');
requestAnimationFrame(frame);
</script>
